name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Compile (release)
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version || true

      - name: Build (release)
        run: swift build -c release

      - name: Bundle .app
        run: ./package.sh release

      - name: Show bundle size
        run: |
          du -sh Pomodoro.app
          du -sh Pomodoro.app/Contents/MacOS/Pomodoro
